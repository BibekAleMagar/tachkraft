services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: real-estate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: real_estate
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d real_estate"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    build:
      context: ./real-estate-backend
      dockerfile: Dockerfile
    container_name: real-estate-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:yourpassword@db:5432/real_estate
      JWT_SECRET: real_estate
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./real-estate-frontend
      dockerfile: Dockerfile
    container_name: real-estate-frontend
    restart: unless-stopped
    environment:
      VITE_APP_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: